version: 2

sources:
  - name: raw
    description: "Fraktal RAW-datasett i Snowflake-databasen ANALYTICS."
    database: ANALYTICS
    schema: RAW

    tables:

      - name: raw_customers
        description: "Kunderegister."
        columns:
          - name: ID
            description: "Unik kunde-ID."
            tests:
              - not_null
              - unique
          - name: NAME
            description: "Navn på kunden."

      - name: raw_items
        description: "Order line items."
        columns:
          - name: ID
            description: "Unik linje-ID."
            tests:
              - not_null
              - unique
          - name: ORDER_ID
            description: "Referanse til ordre."
            tests:
              - not_null
          - name: SKU
            description: "Produktkode."

      - name: raw_orders
        description: "Ordredata."
        columns:
          - name: ID
            description: "Unik ordre-ID."
            tests:
              - not_null
              - unique
          - name: CUSTOMER
            description: "Kunde-ID som la inn ordren."
            tests:
              - not_null
          - name: ORDERED_AT
            description: "Tidspunkt for ordre."
          - name: STORE_ID
            description: "Butikk-ID."
          - name: SUBTOTAL
            description: "Sum før skatt."
          - name: TAX_PAID
            description: "Betalt skatt."
          - name: ORDER_TOTAL
            description: "Totalsum."

      - name: raw_products
        description: "Produktinformasjon."
        columns:
          - name: SKU
            description: "Produktkode."
            tests:
              - not_null
              - unique
          - name: NAME
            description: "Produktnavn."
          - name: TYPE
            description: "Produkttype."
          - name: PRICE
            description: "Pris."
          - name: DESCRIPTION
            description: "Beskrivelse."

      - name: raw_stores
        description: "Butikkdata."
        columns:
          - name: ID
            description: "Butikk-ID."
            tests:
              - not_null
              - unique
          - name: NAME
            description: "Butikknavn."
          - name: OPENED_AT
            description: "Åpningsdato."
          - name: TAX_RATE
            description: "Skattesats."

      - name: raw_supplies
        description: "Leverandørdata."
        columns:
          - name: ID
            description: "Leverandør-ID."
            tests:
              - not_null
              - unique
          - name: NAME
            description: "Navn på leverandør."
          - name: COST
            description: "Kostnad."
          - name: PERISHABLE
            description: "Om varen er forgjengelig."
          - name: SKU
            description: "Produktkode."
